services:
  - type: web
    name: hacienda-el-rio-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hacienda-el-rio-db
          property: connectionString

databases:
  - name: hacienda-el-rio-db
    plan: free
